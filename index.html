<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Avalon — Royal Manuscript Dark</title>
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 64 64'><path d='M32 3 L55 11 V29 C55 46 44 57 32 61 C20 57 9 46 9 29 V11 Z' fill='%232a2116' stroke='%23cfa441' stroke-width='4'/><path d='M32 12 L37 17 L34.5 38 L32 45 L29.5 38 L27 17 Z' fill='%235b9ee8'/><rect x='25' y='40' width='14' height='5' rx='1.5' fill='%235b9ee8'/><circle cx='32' cy='44.5' r='2.5' fill='%23cfa441'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Cinzel+Decorative:wght@700;900&family=Cormorant+Garamond:ital,wght@0,500;0,600;0,700;1,500&family=Noto+Serif+Thai:wght@400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            /* illuminated manuscript, darkened to aged leather + candlelit ink */
            --bg:            #1c1610;
            --bg-deep:       #120e0a;
            --bg-card:       #2a2116;
            --blue:          #5b9ee8;
            --blue-dim:      #3a6fb0;
            --blue-glow:     rgba(91,158,232,0.38);
            --crimson:       #d4574f;
            --crimson-dim:   #a83e37;
            --crimson-glow:  rgba(212,87,79,0.38);
            --green:         #7ea354;
            --text-main:     #ece0c4;
            --text-mid:      #c7b78e;
            --text-muted:    #8c7c58;
            --gold:          #cfa441;
            --noise-op:      0.05;
        }

        html, body { height: 100%; overflow: hidden; }

        body {
            background-color: var(--bg);
            background-image:
                radial-gradient(ellipse 80% 55% at 50% -8%, rgba(207,164,65,0.14) 0%, transparent 60%),
                radial-gradient(ellipse 60% 45% at 100% 105%, rgba(212,87,79,0.1) 0%, transparent 55%),
                repeating-linear-gradient(100deg, rgba(0,0,0,0.05) 0px, rgba(0,0,0,0.05) 1px, transparent 1px, transparent 4px),
                repeating-linear-gradient(10deg, rgba(0,0,0,0.04) 0px, rgba(0,0,0,0.04) 1px, transparent 1px, transparent 5px);
            color: var(--text-main);
            font-family: 'Cormorant Garamond', 'Noto Serif Thai', serif;
            font-weight: 500;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: space-between;
            height: 100dvh;
            padding-top: max(env(safe-area-inset-top, 0px), 12px);
            padding-bottom: max(env(safe-area-inset-bottom, 0px), 16px);
            padding-left: 16px;
            padding-right: 16px;
            position: relative;
        }

        /* aged-paper vignette + border frame */
        body::before {
            content: '';
            position: fixed; inset: 8px;
            pointer-events: none;
            border: 1.5px solid rgba(207,164,65,0.3);
            box-shadow: inset 0 0 70px rgba(0,0,0,0.5), inset 0 0 0 5px rgba(20,15,10,0.5);
            z-index: 0;
        }
        body > * { position: relative; z-index: 1; }

        /* ── LOGO ── */
        .logo-wrap {
            flex-shrink: 0; padding: 10px 0 6px;
            animation: logoFloat 6s ease-in-out infinite;
        }
        @keyframes logoFloat {
            0%, 100% { transform: translateY(0) rotate(-0.3deg); }
            50%      { transform: translateY(-3px) rotate(0.3deg); }
        }
        .logo {
            max-width: 48vw;
            max-height: 10vh;
            object-fit: contain;
            filter: sepia(0.2) drop-shadow(0 0 16px rgba(207,164,65,0.45)) drop-shadow(0 2px 6px rgba(0,0,0,0.5));
        }

        /* ════════════════════════════════
           PHASE 1 — SETUP
        ════════════════════════════════ */
        #setupPhase {
            width: 100%; max-width: 480px;
            flex: 1;
            display: flex; flex-direction: column; justify-content: center;
            gap: 14px;
            animation: fadeIn 0.5s ease;
        }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(6px);} to { opacity: 1; transform: translateY(0);} }

        .section-label {
            font-family: 'Cinzel Decorative', serif;
            font-size: 12px; font-weight: 700;
            letter-spacing: 0.22em;
            color: var(--gold);
            text-transform: uppercase;
            text-align: center;
            text-shadow: 0 0 12px rgba(207,164,65,0.35);
        }
        .section-label::before, .section-label::after { content: '❧'; margin: 0 10px; opacity: 0.6; font-size: 11px; }

        .role-grid {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
            width: 100%;
        }

        .role-card {
            position: relative;
            border-radius: 4px;
            overflow: hidden;
            cursor: pointer;
            background: var(--bg-card);
            border: 3px double rgba(207,164,65,0.3);
            transition: border-color 0.25s ease, box-shadow 0.25s ease, transform 0.15s ease;
            aspect-ratio: 0.72 / 1;
            box-shadow: 0 3px 10px rgba(0,0,0,0.45);
        }
        .role-card:active { transform: scale(0.97); }
        .role-card img {
            width: 100%; height: 100%;
            object-fit: cover; display: block;
            filter: sepia(0.3) brightness(0.32) contrast(1);
            transition: filter 0.3s ease;
        }
        .role-card input { display: none; }

        .role-name {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 22px 4px 8px;
            background: linear-gradient(to top, rgba(5,3,2,0.96) 0%, rgba(5,3,2,0.75) 55%, transparent 100%);
            font-family: 'Cinzel Decorative', serif;
            font-size: 9.5px; font-weight: 700;
            letter-spacing: 0.1em;
            text-align: center;
            color: #ecdcb0;
            z-index: 2;
            text-transform: uppercase;
            transition: color 0.2s;
        }

        /* locked always-on */
        .role-card.is-locked { cursor: default; }
        .role-card.is-locked:has(input:checked) {
            border-color: var(--gold);
            box-shadow: 0 0 12px var(--blue-glow), 0 3px 8px rgba(60,40,10,0.25);
        }
        .role-card.is-locked:has(input:checked) img { filter: sepia(0.15) brightness(0.7) contrast(1.05); }

        /* good selected */
        .role-card.good:has(input:checked) {
            border-color: var(--blue);
            box-shadow: 0 0 18px var(--blue-glow), 0 0 5px rgba(91,158,232,0.45), 0 3px 10px rgba(0,0,0,0.45);
            animation: pulseBlue 2.4s ease-in-out infinite;
        }
        .role-card.good:has(input:checked) img { filter: sepia(0.05) brightness(0.9) contrast(1.1); }
        .role-card.good:has(input:checked) .role-name { color: #bcd6ea; }
        .role-card.good:not(:has(input:disabled)):not(:has(input:checked)):hover img { filter: sepia(0.2) brightness(0.45) contrast(1); }

        /* evil selected */
        .role-card.evil:has(input:checked) {
            border-color: var(--crimson);
            box-shadow: 0 0 18px var(--crimson-glow), 0 0 5px rgba(212,87,79,0.45), 0 3px 10px rgba(0,0,0,0.45);
            animation: pulseRed 2.4s ease-in-out infinite;
        }
        .role-card.evil:has(input:checked) img { filter: sepia(0.05) brightness(0.9) contrast(1.1); }
        .role-card.evil:has(input:checked) .role-name { color: #f2c0bc; }
        .role-card.evil:not(:has(input:disabled)):not(:has(input:checked)):hover img { filter: sepia(0.2) brightness(0.45) contrast(1); }

        @keyframes pulseBlue {
            0%, 100% { box-shadow: 0 0 18px var(--blue-glow), 0 0 5px rgba(91,158,232,0.45), 0 3px 10px rgba(0,0,0,0.45); }
            50%      { box-shadow: 0 0 26px var(--blue-glow), 0 0 9px rgba(91,158,232,0.6), 0 3px 10px rgba(0,0,0,0.45); }
        }
        @keyframes pulseRed {
            0%, 100% { box-shadow: 0 0 18px var(--crimson-glow), 0 0 5px rgba(212,87,79,0.45), 0 3px 10px rgba(0,0,0,0.45); }
            50%      { box-shadow: 0 0 26px var(--crimson-glow), 0 0 9px rgba(212,87,79,0.6), 0 3px 10px rgba(0,0,0,0.45); }
        }

        /* disabled-unchecked */
        .role-card:has(input:disabled:not(:checked)) { opacity: 0.28; cursor: not-allowed; }
        .role-card:has(input:disabled:not(:checked)) img { filter: sepia(0) grayscale(0.9) brightness(0.25); }

        /* ════════════════════════════════
           PHASE 2 — PLAYING
        ════════════════════════════════ */
        #playPhase {
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            flex: 1;
            width: 100%;
            max-width: 480px;
            gap: 22px;
        }

        #charDisplay {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 14px;
            width: 100%;
            height: 28vh;
            min-height: 110px;
            flex-shrink: 0;
        }
        #charDisplay:empty { display: none; }

        .char-img-wrap {
            position: relative;
            height: 100%;
            aspect-ratio: 0.72 / 1;
            border-radius: 4px;
            overflow: hidden;
            border: 3px double rgba(207,164,65,0.4);
            flex-shrink: 0;
            box-shadow: 0 6px 20px rgba(0,0,0,0.5);
            animation: charPop 0.4s cubic-bezier(.34,1.56,.64,1);
        }
        @keyframes charPop {
            from { opacity: 0; transform: translateY(10px) scale(0.92); }
            to   { opacity: 1; transform: translateY(0) scale(1); }
        }
        .char-img-wrap img { width: 100%; height: 100%; object-fit: cover; filter: sepia(0.1) contrast(1.05); }

        .char-img-wrap .char-name {
            position: absolute;
            bottom: 0; left: 0; right: 0;
            padding: 26px 4px 9px;
            background: linear-gradient(to top, rgba(5,3,2,0.96) 0%, rgba(5,3,2,0.78) 55%, transparent 100%);
            font-family: 'Cinzel Decorative', serif;
            font-size: 10.5px; font-weight: 700;
            letter-spacing: 0.08em;
            text-align: center;
            color: #ecdcb0;
            z-index: 2;
            text-transform: uppercase;
        }
        .char-img-wrap.char-good { border-color: var(--blue); box-shadow: 0 0 18px var(--blue-glow), 0 6px 20px rgba(0,0,0,0.5); }
        .char-img-wrap.char-good .char-name { color: #bcd6ea; }
        .char-img-wrap.char-evil { border-color: var(--crimson); box-shadow: 0 0 18px var(--crimson-glow), 0 6px 20px rgba(0,0,0,0.5); }
        .char-img-wrap.char-evil .char-name { color: #f2c0bc; }

        .ban-overlay {
            position: absolute; inset: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6);
            z-index: 3;
        }
        .ban-overlay svg { width: 50%; height: 50%; opacity: 0.95; filter: drop-shadow(0 0 6px rgba(212,60,50,0.6)); }

        #scriptText {
            width: 100%;
            text-align: center;
            font-size: clamp(18px, 4.6vw, 23px);
            font-weight: 600;
            font-style: italic;
            line-height: 1.7;
            color: var(--text-main);
            letter-spacing: 0.01em;
            padding: 22px 24px;
            border-radius: 6px;
            background: rgba(42,33,22,0.7);
            border: 1.5px solid rgba(207,164,65,0.35);
            box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 4px 14px rgba(0,0,0,0.4);
            animation: textFade 0.35s ease;
        }
        @keyframes textFade { from { opacity: 0.3; } to { opacity: 1; } }

        /* ── BUTTONS ── */
        .btn-group { display: flex; gap: 10px; flex-shrink: 0; padding-bottom: 4px; }

        button {
            font-family: 'Cinzel Decorative', serif;
            font-size: 13px; font-weight: 700;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            padding: 14px 26px;
            border-radius: 6px;
            cursor: pointer;
            transition: transform 0.15s ease, box-shadow 0.2s ease, background 0.2s ease;
            outline: none;
        }
        button:active { transform: scale(0.95); }

        #playBtn {
            background: rgba(91,158,232,0.16);
            border: 1.5px solid rgba(91,158,232,0.55);
            color: #bcdcff;
            box-shadow: 0 0 18px rgba(91,158,232,0.28);
        }
        #playBtn:hover {
            background: rgba(91,158,232,0.26);
            box-shadow: 0 0 26px rgba(91,158,232,0.4);
        }

        #pauseBtn {
            background: rgba(126,163,84,0.16);
            border: 1.5px solid rgba(126,163,84,0.5);
            color: #cfe6ac;
            box-shadow: 0 0 16px rgba(126,163,84,0.22);
        }
        #pauseBtn:hover {
            background: rgba(126,163,84,0.26);
            box-shadow: 0 0 22px rgba(126,163,84,0.32);
        }

        #endBtn {
            background: rgba(212,87,79,0.16);
            border: 1.5px solid rgba(212,87,79,0.5);
            color: #ffc9c2;
            box-shadow: 0 0 16px rgba(212,87,79,0.25);
        }
        #endBtn:hover {
            background: rgba(212,87,79,0.26);
            box-shadow: 0 0 22px rgba(212,87,79,0.38);
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

    <div class="logo-wrap">
        <img src="images/logo.png" alt="Avalon" class="logo">
    </div>

    <!-- PHASE 1: SETUP -->
    <div id="setupPhase">
        <p class="section-label">เลือก Role พิเศษ</p>
        <div class="role-grid">
            <label class="role-card is-locked good">
                <input type="checkbox" name="roles" value="Merlin" checked disabled>
                <img src="images/merlin.png" alt="Merlin">
                <span class="role-name">Merlin</span>
            </label>
            <label class="role-card is-locked evil">
                <input type="checkbox" name="roles" value="Assassin" checked disabled>
                <img src="images/assassin.png" alt="Assassin">
                <span class="role-name">Assassin</span>
            </label>
            <label class="role-card good">
                <input type="checkbox" name="roles" value="Percival">
                <img src="images/percival.png" alt="Percival">
                <span class="role-name">Percival</span>
            </label>
            <label class="role-card evil">
                <input type="checkbox" name="roles" value="Morgana" disabled>
                <img src="images/morgana.png" alt="Morgana">
                <span class="role-name">Morgana</span>
            </label>
            <label class="role-card evil">
                <input type="checkbox" name="roles" value="Mordred">
                <img src="images/mordred.png" alt="Mordred">
                <span class="role-name">Mordred</span>
            </label>
            <label class="role-card evil">
                <input type="checkbox" name="roles" value="Oberon">
                <img src="images/oberon.png" alt="Oberon">
                <span class="role-name">Oberon</span>
            </label>
        </div>
    </div>

    <!-- PHASE 2: PLAYING -->
    <div id="playPhase">
        <div id="charDisplay"></div>
        <div id="scriptText"></div>
    </div>

    <!-- CONTROLS -->
    <div class="btn-group">
        <button id="playBtn">เล่น</button>
        <button id="pauseBtn" style="display:none;">หยุด</button>
        <button id="endBtn"   style="display:none;">จบ</button>
    </div>

    <audio id="player"></audio>
    <audio id="bgm" src="audio/bgm.mp3" loop></audio>

    <script>
        const STATE = { IDLE:"idle", PLAYING:"playing", WAITING:"waiting", PAUSED:"paused" };
        let state = STATE.IDLE;
        let dialogue = [], current = 0;
        let startDelayTimeout = null;

        let audioCtx = null, bgmGainNode = null, bgmSourceNode = null;
        const BGM_VOLUME = 0.2;

        function setupBgmGain() {
            if (audioCtx) return;
            audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            bgmSourceNode = audioCtx.createMediaElementSource(bgm);
            bgmGainNode = audioCtx.createGain();
            bgmGainNode.gain.value = BGM_VOLUME;
            bgmSourceNode.connect(bgmGainNode).connect(audioCtx.destination);
        }
        let defaultDelay = 0, delayRemaining = 0, delayTimeout = null, delayStart = 0;

        const player      = document.getElementById("player");
        const scriptText  = document.getElementById("scriptText");
        const charDisplay = document.getElementById("charDisplay");
        const playBtn     = document.getElementById("playBtn");
        const pauseBtn    = document.getElementById("pauseBtn");
        const endBtn      = document.getElementById("endBtn");
        const bgm         = document.getElementById("bgm");
        const setupPhase  = document.getElementById("setupPhase");
        const playPhase   = document.getElementById("playPhase");

        const CHARS = {
            Merlin:   { src:"images/merlin.png",   side:"good" },
            Percival: { src:"images/percival.png",  side:"good" },
            Morgana:  { src:"images/morgana.png",   side:"evil" },
            Mordred:  { src:"images/mordred.png",   side:"evil" },
            Oberon:   { src:"images/oberon.png",    side:"evil" },
            Assassin: { src:"images/assassin.png",  side:"evil" },
        };

        function makeCharCard(name, banned=false) {
            const c = CHARS[name];
            const wrap = document.createElement("div");
            wrap.className = `char-img-wrap char-${c.side}`;
            const img = document.createElement("img");
            img.src = c.src; img.alt = name;
            wrap.appendChild(img);
            const label = document.createElement("span");
            label.className = "char-name"; label.textContent = name;
            wrap.appendChild(label);
            if (banned) {
                const overlay = document.createElement("div");
                overlay.className = "ban-overlay";
                overlay.innerHTML = `<svg viewBox="0 0 100 100" xmlns="http://www.w3.org/2000/svg">
                    <circle cx="50" cy="50" r="44" fill="none" stroke="#ff4040" stroke-width="9"/>
                    <line x1="18" y1="18" x2="82" y2="82" stroke="#ff4040" stroke-width="9" stroke-linecap="round"/>
                </svg>`;
                wrap.appendChild(overlay);
            }
            return wrap;
        }

        function showChars(chars) {
            charDisplay.innerHTML = "";
            if (!chars || chars.length === 0) {
                playPhase.style.justifyContent = "center";
                charDisplay.style.display = "none";
            } else {
                playPhase.style.justifyContent = "center";
                charDisplay.style.display = "flex";
                chars.forEach(c => charDisplay.appendChild(makeCharCard(c.name, c.banned)));
            }
        }

        function buildDialogue() {
            const roles = Array.from(document.querySelectorAll('input[name="roles"]:checked')).map(cb => cb.value);
            dialogue = [];

            dialogue.push({ scripts:"ทุกคนหลับตาพร้อมกับกำมือไว้หน้าตัวเอง", audio:"audio/sound1.mp3", chars:[] });

            if (roles.includes("Oberon")) {
                dialogue.push({ scripts:"บริวารของมอร์เดร็ดทุกคนยกเว้นโอเบรอนลืมตา และมองรอบๆ เพื่อจดจำพรรคพวกของตนเอง", audio:"audio/sound2.mp3", delay:3000, chars:[{name:"Oberon",banned:true}] });
            } else {
                dialogue.push({ scripts:"บริวารของมอร์เดร็ดทุกคนลืมตา และมองรอบๆ เพื่อจดจำพรรคพวกของตนเอง", audio:"audio/sound3.mp3", delay:3000, chars:[] });
            }

            dialogue.push({ scripts:"บริวารของมอร์เดร็ดหลับตา", audio:"audio/sound4.mp3", chars:[] });

            if (roles.includes("Mordred")) {
                dialogue.push({ scripts:"บริวารของมอร์เดร็ดยกเว้นมอร์เดร็ดชูนิ้วโป้งขึ้นมา เพื่อที่เมอร์ลินจะได้เห็นทุกคน", audio:"audio/sound6.mp3", delay:2000, chars:[{name:"Mordred",banned:true}] });
            } else {
                dialogue.push({ scripts:"บริวารของมอร์เดร็ดชูนิ้วโป้งขึ้นมา เพื่อที่เมอร์ลินจะได้เห็นทุกคน", audio:"audio/sound7.mp3", delay:2000, chars:[] });
            }

            dialogue.push({ scripts:"เมอร์ลิน ลืมตาและมองตัวแทนของฝ่ายร้าย", audio:"audio/sound8.mp3", delay:3000, chars:[{name:"Merlin"}] });
            dialogue.push({ scripts:"บริวารของมอร์เดร็ดเก็บนิ้วโป้ง แล้วกำมือ", audio:"audio/sound9.mp3", chars:[] });
            dialogue.push({ scripts:"เมอร์ลินหลับตาได้", audio:"audio/sound10.mp3", chars:[{name:"Merlin"}] });

            if (roles.includes("Percival")) {
                if (roles.includes("Morgana")) {
                    dialogue.push({ scripts:"เมอร์ลินและมอร์กานาชูนิ้วโป้ง เพื่อที่เพอร์ชีวอลจะได้มองเห็น", audio:"audio/sound11.mp3", delay:2000, chars:[{name:"Merlin"},{name:"Morgana"}] });
                    dialogue.push({ scripts:"เพอร์ชีวอลลืมตามามอง หนึ่งในนี้คือเมอร์ลินและอีกคนคือมอร์กานา", audio:"audio/sound12.mp3", delay:3000, chars:[{name:"Percival"}] });
                    dialogue.push({ scripts:"เมอร์ลินและมอร์กานาเก็บนิ้วและกำมือไว้หน้าตัวเอง", audio:"audio/sound13.mp3", chars:[{name:"Merlin"},{name:"Morgana"}] });
                } else {
                    dialogue.push({ scripts:"เมอร์ลินชูนิ้วโป้ง เพื่อที่เพอร์ชีวอลจะได้มองเห็น", audio:"audio/sound14.mp3", delay:2000, chars:[{name:"Merlin"}] });
                    dialogue.push({ scripts:"เพอร์ชีวอลลืมตามามอง นี่คือเมอร์ลิน", audio:"audio/sound15.mp3", delay:3000, chars:[{name:"Percival"}] });
                    dialogue.push({ scripts:"เมอร์ลินเก็บนิ้วและกำมือไว้หน้าตัวเอง", audio:"audio/sound16.mp3", chars:[{name:"Merlin"}] });
                }
                dialogue.push({ scripts:"เพอร์ชีวอลหลับตา", audio:"audio/sound17.mp3", chars:[{name:"Percival"}] });
            }

            dialogue.push({ scripts:"ทุกคนลืมตาได้", audio:"audio/sound18.mp3", chars:[] });
        }

        playBtn.onclick = () => {
            buildDialogue();
            current = 0;
            setupBgmGain();
            if (audioCtx.state === "suspended") audioCtx.resume();
            bgm.currentTime = 0; bgm.play();
            setupPhase.style.display = "none";
            playPhase.style.display  = "flex";
            charDisplay.innerHTML = "";
            charDisplay.style.display = "none";
            scriptText.textContent = "เตรียมตัว…";
            playBtn.style.display = "none";
            endBtn.style.display  = "inline-block";
            startDelayTimeout = setTimeout(() => {
                pauseBtn.style.display = "inline-block";
                playCurrent();
            }, 3000);
        };

        function playCurrent() {
            if (current >= dialogue.length) { endGame(); return; }
            state = STATE.PLAYING;
            const step = dialogue[current];
            scriptText.textContent = step.scripts;
            showChars(step.chars);
            player.src = step.audio;
            player.play();
        }

        player.onended = () => {
            state = STATE.WAITING;
            delayRemaining = dialogue[current].delay ?? defaultDelay;
            delayStart = Date.now();
            delayTimeout = setTimeout(nextStep, delayRemaining);
        };

        function nextStep() { current++; playCurrent(); }

        pauseBtn.onclick = () => {
            if (state === STATE.PLAYING) {
                player.pause(); bgm.pause();
                state = STATE.PAUSED; pauseBtn.innerText = "เล่นต่อ";
            } else if (state === STATE.WAITING) {
                bgm.pause(); clearTimeout(delayTimeout);
                delayRemaining -= Date.now() - delayStart;
                state = STATE.PAUSED; pauseBtn.innerText = "เล่นต่อ";
            } else if (state === STATE.PAUSED) {
                if (player.currentTime > 0 && player.currentTime < player.duration) {
                    player.play(); bgm.play(); state = STATE.PLAYING;
                } else if (delayRemaining > 0) {
                    bgm.play(); state = STATE.WAITING;
                    delayStart = Date.now();
                    delayTimeout = setTimeout(nextStep, delayRemaining);
                }
                pauseBtn.innerText = "หยุด";
            }
        };

        endBtn.onclick = endGame;
        function endGame() {
            clearTimeout(startDelayTimeout); clearTimeout(delayTimeout);
            player.pause(); player.currentTime = 0;
            bgm.pause(); bgm.currentTime = 0;
            state = STATE.IDLE; current = 0;
            playPhase.style.display  = "none";
            setupPhase.style.display = "flex";
            playBtn.style.display  = "inline-block";
            pauseBtn.style.display = "none";
            endBtn.style.display   = "none";
            pauseBtn.innerText = "หยุด";
        }

        const percivalCb = document.querySelector('input[value="Percival"]');
        const morganaCb  = document.querySelector('input[value="Morgana"]');
        morganaCb.disabled = true;
        percivalCb.addEventListener("change", function () {
            if (this.checked) { morganaCb.disabled = false; }
            else { morganaCb.checked = false; morganaCb.disabled = true; }
        });
    </script>
</body>
</html>
